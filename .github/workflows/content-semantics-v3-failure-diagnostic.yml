name: Content Semantics v3 Failure Diagnostic

on:
  push:
    branches:
      - launch/factory-5d-runner-infrastructure
    paths:
      - "scripts/diagnose_content_snapshot_v3_failure.sh"
      - ".github/workflows/content-semantics-v3-failure-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  publish-sanitized-v3-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}
      PRIVATE_REPO: TheGor-365/ai-course-source-library
      PRIVATE_BRANCH: launch/factory-5d-content-semantics-snapshot-v3
      PRIVATE_SHA: f32b04dbe3b1043223b4300fea9662cc6026f630
      STATUS_CONTEXT: public-runner/content-semantics/snapshot-v3/failure
      PUBLIC_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone exact snapshot v3
        id: checkout
        run: |
          set -euo pipefail
          PRIVATE_DIR="$RUNNER_TEMP/source_snapshot_v3"
          git config --global advice.detachedHead false
          git clone --filter=blob:none --no-checkout \
            "https://x-access-token:${PRIVATE_REPO_PAT}@github.com/${PRIVATE_REPO}.git" \
            "$PRIVATE_DIR" >/dev/null 2>&1
          git -C "$PRIVATE_DIR" fetch --depth=2 origin \
            "refs/heads/${PRIVATE_BRANCH}:refs/remotes/origin/${PRIVATE_BRANCH}" \
            >/dev/null 2>&1
          [[ "$(git -C "$PRIVATE_DIR" rev-parse "refs/remotes/origin/${PRIVATE_BRANCH}")" == "$PRIVATE_SHA" ]]
          git -C "$PRIVATE_DIR" checkout --detach "$PRIVATE_SHA" >/dev/null 2>&1
          echo "private_dir=$PRIVATE_DIR" >> "$GITHUB_OUTPUT"

      - name: Run learner-safe diagnostic
        id: diagnostic
        run: |
          set +e
          SUMMARY="$RUNNER_TEMP/content_v3_failure.txt"
          bash scripts/diagnose_content_snapshot_v3_failure.sh \
            "${{ steps.checkout.outputs.private_dir }}" \
            >"$SUMMARY" 2>&1
          RC=$?
          ERROR_CLASS="$(sed -n 's/^error_class=//p' "$SUMMARY" | tail -n 1)"
          ERROR_CODE="$(sed -n 's/^error_code=//p' "$SUMMARY" | tail -n 1)"
          [[ -n "$ERROR_CLASS" ]] || ERROR_CLASS=none
          [[ -n "$ERROR_CODE" ]] || ERROR_CODE=none
          echo "exit_code=$RC" >> "$GITHUB_OUTPUT"
          echo "error_class=$ERROR_CLASS" >> "$GITHUB_OUTPUT"
          echo "error_code=$ERROR_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish structural failure status
        run: |
          set -euo pipefail
          RC="${{ steps.diagnostic.outputs.exit_code }}"
          ERROR_CLASS="${{ steps.diagnostic.outputs.error_class }}"
          ERROR_CODE="${{ steps.diagnostic.outputs.error_code }}"
          SAFE="$(printf '%s-%s' "$ERROR_CLASS" "$ERROR_CODE" | tr -cd 'a-zA-Z0-9._-')"
          CONTEXT="${STATUS_CONTEXT}/${SAFE}"
          if [[ "$RC" == 0 ]]; then
            STATE=success
            DESCRIPTION='Content snapshot v3 structural diagnostic: pass'
          else
            STATE=failure
            DESCRIPTION="Content snapshot v3 structural diagnostic: ${SAFE}"
          fi
          bash scripts/write_private_commit_status.sh \
            "$PRIVATE_REPO" "$PRIVATE_SHA" "$CONTEXT" "$STATE" \
            "$DESCRIPTION" "$PUBLIC_RUN_URL"
          echo "diagnostic_context=$CONTEXT"
          echo 'private_content_printed=false'
          echo 'artifact_policy=none'

      - name: Final diagnostic result
        run: |
          set -euo pipefail
          [[ "${{ steps.diagnostic.outputs.exit_code }}" == 0 ]]
