name: Content Semantics Snapshot Diagnostic

on:
  push:
    branches:
      - launch/factory-5d-runner-infrastructure
    paths:
      - "requests/content_semantics_snapshot_request_v01.json"
      - "scripts/run_content_semantics_launch_gate.sh"
      - ".github/workflows/content-semantics-snapshot-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  publish-sanitized-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}
      PRIVATE_REPO: TheGor-365/ai-course-source-library
      PRIVATE_BRANCH: launch/factory-5d-content-semantics-snapshot-v1
      PRIVATE_SHA: bb7af6fb9964afd2f5784704a8a19900f6e6c56f
      STATUS_CONTEXT: public-runner/content-semantics/snapshot-v1
      PUBLIC_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout public runner
        uses: actions/checkout@v4

      - name: Clone exact snapshot
        id: checkout
        run: |
          set -euo pipefail
          PRIVATE_DIR="$RUNNER_TEMP/source_snapshot"
          git config --global advice.detachedHead false
          git clone --filter=blob:none --no-checkout \
            "https://x-access-token:${PRIVATE_REPO_PAT}@github.com/${PRIVATE_REPO}.git" \
            "$PRIVATE_DIR" >/dev/null 2>&1
          git -C "$PRIVATE_DIR" fetch --depth=2 origin \
            "refs/heads/${PRIVATE_BRANCH}:refs/remotes/origin/${PRIVATE_BRANCH}" \
            >/dev/null 2>&1
          [[ "$(git -C "$PRIVATE_DIR" rev-parse "refs/remotes/origin/${PRIVATE_BRANCH}")" == "$PRIVATE_SHA" ]]
          git -C "$PRIVATE_DIR" checkout --detach "$PRIVATE_SHA" >/dev/null 2>&1
          echo "private_dir=$PRIVATE_DIR" >> "$GITHUB_OUTPUT"

      - name: Run gate and classify
        id: gate
        run: |
          set +e
          SUMMARY_FILE="$RUNNER_TEMP/content_snapshot_diagnostic.txt"
          bash scripts/run_content_semantics_launch_gate.sh \
            "${{ steps.checkout.outputs.private_dir }}" \
            >"$SUMMARY_FILE" 2>&1
          RC=$?
          ERROR_CLASS="$(sed -n 's/^error_class=//p' "$SUMMARY_FILE" | tail -n 1)"
          ERROR_CODE="$(sed -n 's/^error_code=//p' "$SUMMARY_FILE" | tail -n 1)"
          [[ -n "$ERROR_CLASS" ]] || ERROR_CLASS=none
          [[ -n "$ERROR_CODE" ]] || ERROR_CODE=none
          echo "exit_code=$RC" >> "$GITHUB_OUTPUT"
          echo "error_class=$ERROR_CLASS" >> "$GITHUB_OUTPUT"
          echo "error_code=$ERROR_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish diagnostic context
        run: |
          set -euo pipefail
          RC="${{ steps.gate.outputs.exit_code }}"
          ERROR_CLASS="${{ steps.gate.outputs.error_class }}"
          ERROR_CODE="${{ steps.gate.outputs.error_code }}"
          SAFE="$(printf '%s-%s' "$ERROR_CLASS" "$ERROR_CODE" | tr -cd 'a-zA-Z0-9._-')"
          CONTEXT="${STATUS_CONTEXT}/diagnostic/${SAFE}"
          if [[ "$RC" == 0 ]]; then
            STATE=success
            DESCRIPTION='Content snapshot diagnostic: pass'
          else
            STATE=failure
            DESCRIPTION="Content snapshot diagnostic: ${SAFE}"
          fi
          bash scripts/write_private_commit_status.sh \
            "$PRIVATE_REPO" "$PRIVATE_SHA" "$CONTEXT" "$STATE" \
            "$DESCRIPTION" "$PUBLIC_RUN_URL"
          echo "diagnostic_context=$CONTEXT"
          echo 'private_content_printed=false'
          echo 'artifact_policy=none'

      - name: Final diagnostic result
        run: |
          set -euo pipefail
          [[ "${{ steps.gate.outputs.exit_code }}" == 0 ]]
